name: Build APK Pro
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-20.04  # التغيير هنا لضمان استقرار الأدوات
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev openjdk-17-jdk unzip zip cmake

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade "Cython<3.0.0" "buildozer==1.5.0" setuptools

      - name: Build with Buildozer
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          # حذف أي ملفات قديمة لبدء بناء نظيف 100%
          rm -rf .buildozer
          # تشغيل البناء مع الموافقة التلقائية
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Meeqat-Pro-Final-APK
          path: bin/*.apk
