name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
          pip install --upgrade buildozer Cython==0.29.33 setuptools

      - name: Build with Buildozer
        run: |
          buildozer init
          # تعديل الإعدادات لضمان النجاح
          sed -i 's/^requirements = .*/requirements = python3,kivy==2.2.1,arabic-reshaper,python-bidi,requests,geopy,pytz/' buildozer.spec
          sed -i 's/^#?android.api = .*/android.api = 31/' buildozer.spec
          sed -i 's/^source.include_exts = .*/source.include_exts = py,png,jpg,ttf,json/' buildozer.spec
          
          # بدء البناء المباشر
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-astro-app-apk
          path: bin/*.apk
