name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            openjdk-17-jdk \
            unzip \
            zip \
            cmake

      - name: Install Python Tools
        run: |
          pip install --upgrade pip
          pip install --upgrade "Cython<3.0.0" buildozer setuptools

      - name: Build with Buildozer
        run: |
          # إنشاء ملف الإعدادات
          buildozer init
          
          # تعديل الإعدادات لضمان نجاح التحميل وتجاوز أخطاء الأدوات
          sed -i 's/^requirements = .*/requirements = python3,kivy==2.2.1,arabic-reshaper,python-bidi,requests,geopy,pytz/' buildozer.spec
          sed -i 's/^#?android.api = .*/android.api = 31/' buildozer.spec
          sed -i 's/^#?android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/^#?android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^source.include_exts = .*/source.include_exts = py,png,jpg,ttf,json/' buildozer.spec
          
          # إجبار النظام على استخدام جاوا 17 (يحل مشكلة الـ SDK)
          export JAVA_HOME=$JAVA_HOME_17_X64
          
          # بدء البناء مع الموافقة على كل شيء
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Meeqat-Pro-App
          path: bin/*.apk
