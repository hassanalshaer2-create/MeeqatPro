from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.label import Label
from kivy.core.text import LabelBase
import calculations

# تسجيل الخط العربي لضمان ظهوره في الأندرويد
LabelBase.register(name='ArabicFont', fn_regular='arial.ttf')

class MeeqatProApp(App):
    def build(self):
        self.engine = calculations.HassanAstroWhitePro()
        layout = BoxLayout(orientation='vertical', padding=20)
        
        # عرض نص تجريبي بالعربي
        msg = self.engine.fx("الميقاتي الفلكي برو - جاهز للعمل")
        lbl = Label(text=msg, font_name='ArabicFont', font_size='25sp')
        
        layout.add_widget(lbl)
        return layout

if __name__ == '__main__':
    MeeqatProApp().run()
